<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Define styles -->
  <defs>
    <style>
      .data-box { fill: #D4E6F1; stroke: #2E86C1; stroke-width: 2; }
      .model-box { fill: #D5F4E6; stroke: #27AE60; stroke-width: 2; }
      .eval-box { fill: #FCE5CD; stroke: #D68910; stroke-width: 2; }
      .label-text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; text-anchor: middle; }
      .title-text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 600; fill: #2c3e50; text-anchor: middle; }
      .small-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #34495e; text-anchor: middle; }
      .arrow-line { stroke: #2c3e50; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #555; text-anchor: middle; font-style: italic; }
      .column-label { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #1a1a1a; text-anchor: middle; }
    </style>

    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#f9f9f9"/>

  <!-- Column headers -->
  <text x="150" y="35" class="column-label">DATA</text>
  <text x="550" y="35" class="column-label">CALIBRATION PIPELINE</text>
  <text x="1000" y="35" class="column-label">EVALUATION</text>

  <!-- COLUMN 1: DATA INPUT -->

  <!-- Box 1: FIA Remeasurement Data -->
  <rect x="30" y="70" width="240" height="60" rx="5" class="data-box"/>
  <text x="150" y="93" class="title-text">FIA Remeasurement Data</text>
  <text x="150" y="110" class="small-text">(National, all states)</text>

  <!-- Arrow down -->
  <path d="M 150 130 L 150 160" class="arrow-line"/>

  <!-- Box 2: Data Processing -->
  <rect x="30" y="160" width="240" height="80" rx="5" class="data-box"/>
  <text x="150" y="185" class="title-text">Data Processing</text>
  <text x="150" y="203" class="small-text">Assign to 25 FVS variants</text>
  <text x="150" y="220" class="small-text">Compute predictors</text>
  <text x="150" y="235" class="small-text">(BAL, CR, SI, component split)</text>

  <!-- Arrow to calibration -->
  <path d="M 270 200 L 320 200" class="arrow-line"/>

  <!-- COLUMN 2: CALIBRATION PIPELINE -->

  <!-- Box 3a: Height-Diameter -->
  <rect x="320" y="70" width="180" height="65" rx="5" class="model-box"/>
  <text x="410" y="93" class="title-text">Height Diameter</text>
  <text x="410" y="112" class="small-text">Chapman Richards</text>
  <text x="410" y="128" class="small-text">brms</text>

  <!-- Box 3b: Diameter Growth -->
  <rect x="520" y="70" width="180" height="65" rx="5" class="model-box"/>
  <text x="610" y="93" class="title-text">Diameter Growth</text>
  <text x="610" y="112" class="small-text">Wykoff</text>
  <text x="610" y="128" class="small-text">CmdStanR</text>

  <!-- Box 3c: Mortality -->
  <rect x="720" y="70" width="180" height="65" rx="5" class="model-box"/>
  <text x="810" y="93" class="title-text">Mortality</text>
  <text x="810" y="112" class="small-text">Logistic</text>
  <text x="810" y="128" class="small-text">brms</text>

  <!-- Box 3d: Crown Ratio -->
  <rect x="320" y="165" width="180" height="65" rx="5" class="model-box"/>
  <text x="410" y="188" class="title-text">Crown Ratio</text>
  <text x="410" y="207" class="small-text">Beta regression</text>
  <text x="410" y="223" class="small-text">brms</text>

  <!-- Box 3e: SDIMAX -->
  <rect x="520" y="165" width="180" height="65" rx="5" class="model-box"/>
  <text x="610" y="188" class="title-text">SDIMAX</text>
  <text x="610" y="207" class="small-text">Quantile</text>
  <text x="610" y="223" class="small-text">regression</text>

  <!-- Box 3f: Height Increment -->
  <rect x="720" y="165" width="180" height="65" rx="5" class="model-box"/>
  <text x="810" y="188" class="title-text">Height Increment</text>
  <text x="810" y="207" class="small-text">(Not calibrated)</text>

  <!-- Arrows from data processing to model boxes -->
  <path d="M 320 210 L 320 102 L 410 102" class="arrow-line"/>
  <path d="M 320 210 L 610 102" class="arrow-line"/>
  <path d="M 320 210 L 810 102" class="arrow-line"/>
  <path d="M 320 210 L 410 197" class="arrow-line"/>
  <path d="M 320 210 L 610 197" class="arrow-line"/>
  <path d="M 320 210 L 810 197" class="arrow-line"/>

  <!-- Box 4: Posterior Parameter Distributions -->
  <rect x="320" y="260" width="580" height="60" rx="5" class="model-box"/>
  <text x="610" y="283" class="title-text">Posterior Parameter Distributions</text>
  <text x="610" y="303" class="small-text">MAP → HMC → constrained ADVI fallback</text>

  <!-- Arrows from model boxes to posterior -->
  <path d="M 410 230 L 410 260" class="arrow-line"/>
  <path d="M 610 230 L 610 260" class="arrow-line"/>
  <path d="M 810 230 L 810 260" class="arrow-line"/>

  <!-- Arrow to evaluation -->
  <path d="M 900 290 L 950 290" class="arrow-line"/>

  <!-- COLUMN 3: EVALUATION -->

  <!-- Box 5: Tree-Level Evaluation -->
  <rect x="950" y="260" width="220" height="70" rx="5" class="eval-box"/>
  <text x="1060" y="283" class="title-text">Tree Level Evaluation</text>
  <text x="1060" y="302" class="small-text">R², AUC, RMSE, bias</text>

  <!-- Arrow down -->
  <path d="M 1060 330 L 1060 360" class="arrow-line"/>

  <!-- Box 6: Bakuzis Matrix -->
  <rect x="950" y="360" width="220" height="80" rx="5" class="eval-box"/>
  <text x="1060" y="383" class="title-text">Bakuzis Matrix</text>
  <text x="1060" y="402" class="small-text">Ecological law testing</text>
  <text x="1060" y="418" class="small-text">(Sukachev, Eichhorn,</text>
  <text x="1060" y="433" class="small-text">Crown recession, Mortality)</text>

  <!-- Arrow down -->
  <path d="M 1060 440 L 1060 470" class="arrow-line"/>

  <!-- Box 7: Stand-Level Projection -->
  <rect x="950" y="470" width="220" height="70" rx="5" class="eval-box"/>
  <text x="1060" y="493" class="title-text">Stand Level Projection</text>
  <text x="1060" y="512" class="small-text">50 year simulation</text>
  <text x="1060" y="527" class="small-text">with annualization</text>

  <!-- Arrow down -->
  <path d="M 1060 540 L 1060 570" class="arrow-line"/>

  <!-- Box 8: FIA Plot Benchmarking -->
  <rect x="950" y="570" width="220" height="70" rx="5" class="eval-box"/>
  <text x="1060" y="593" class="title-text">FIA Plot Benchmarking</text>
  <text x="1060" y="612" class="small-text">Predicted vs observed</text>
  <text x="1060" y="627" class="small-text">at condition level</text>

  <!-- Arrow down -->
  <path d="M 1060 640 L 1060 670" class="arrow-line"/>

  <!-- Box 9: Comparison to Default FVS -->
  <rect x="950" y="670" width="220" height="70" rx="5" class="eval-box"/>
  <text x="1060" y="693" class="title-text">Comparison to Default FVS</text>
  <text x="1060" y="712" class="small-text">Calibrated vs stock</text>
  <text x="1060" y="727" class="small-text">parameters</text>

  <!-- Legend/notes at bottom -->
  <text x="50" y="770" class="small-text" style="text-anchor: start; font-size: 11px; fill: #666;">
    Data (blue) → Calibration models (green) → Evaluation metrics (orange)
  </text>

</svg>
