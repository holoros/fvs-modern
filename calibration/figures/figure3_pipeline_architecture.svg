<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-end">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="680" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Figure 3. Bayesian Calibration Pipeline Architecture</text>

  <!-- DATA SOURCE -->
  <rect x="30" y="55" width="160" height="55" rx="8" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="77" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A73E8">FIA Database</text>
  <text x="110" y="93" text-anchor="middle" font-size="9" fill="#555">Remeasurement plots</text>
  <text x="110" y="105" text-anchor="middle" font-size="9" fill="#555">All 50 states</text>

  <!-- CONFIG -->
  <rect x="30" y="130" width="160" height="55" rx="8" fill="#FFF3E0" stroke="#FB8C00" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="152" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">FVS Config JSONs</text>
  <text x="110" y="168" text-anchor="middle" font-size="9" fill="#555">25 variant configs</text>
  <text x="110" y="180" text-anchor="middle" font-size="9" fill="#555">Default parameters</text>

  <!-- STEP 01: Data Prep -->
  <rect x="240" y="70" width="150" height="50" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="315" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">01: FIA Extract</text>
  <text x="315" y="104" text-anchor="middle" font-size="8.5" fill="#555">rFIA + data prep</text>

  <!-- Arrows from sources to step 01 -->
  <line x1="190" y1="82" x2="237" y2="88" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="190" y1="157" x2="240" y2="105" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DATA FILES BOX -->
  <rect x="240" y="140" width="150" height="65" rx="5" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="315" y="156" text-anchor="middle" font-size="9" font-weight="bold" fill="#424242">Per-Variant CSVs</text>
  <text x="315" y="170" text-anchor="middle" font-size="8" fill="#666">diameter_growth.csv</text>
  <text x="315" y="181" text-anchor="middle" font-size="8" fill="#666">height_diameter.csv</text>
  <text x="315" y="192" text-anchor="middle" font-size="8" fill="#666">mortality.csv + 2 more</text>

  <line x1="315" y1="120" x2="315" y2="137" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- MODEL FITTING BLOCK -->
  <rect x="430" y="50" width="350" height="290" rx="10" fill="none" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="605" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Model Fitting (per variant)</text>

  <!-- Step 02 -->
  <rect x="450" y="85" width="140" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="520" y="102" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1B5E20">02: Diameter Growth</text>
  <text x="520" y="116" text-anchor="middle" font-size="8" fill="#555">CmdStanR (Wykoff)</text>

  <!-- Step 03 -->
  <rect x="620" y="85" width="140" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="690" y="102" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1B5E20">03: Height~Diameter</text>
  <text x="690" y="116" text-anchor="middle" font-size="8" fill="#555">brms (Chapman-Richards)</text>

  <!-- Step 03b -->
  <rect x="450" y="140" width="140" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="520" y="157" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1B5E20">03b: Height Incr.</text>
  <text x="520" y="171" text-anchor="middle" font-size="8" fill="#555">CmdStanR (conditional)</text>

  <!-- Step 04 -->
  <rect x="620" y="140" width="140" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="690" y="157" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1B5E20">04: Mortality</text>
  <text x="690" y="171" text-anchor="middle" font-size="8" fill="#555">brms (logistic)</text>

  <!-- Step 05 -->
  <rect x="450" y="195" width="140" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="520" y="212" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1B5E20">05: Crown Ratio</text>
  <text x="520" y="226" text-anchor="middle" font-size="8" fill="#555">brms (linear)</text>

  <!-- Step 09 -->
  <rect x="620" y="195" width="140" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="690" y="212" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#1B5E20">09: Stand Density</text>
  <text x="690" y="226" text-anchor="middle" font-size="8" fill="#555">quantreg + brms</text>

  <!-- Multi-strategy inference box -->
  <rect x="460" y="250" width="300" height="75" rx="6" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <text x="610" y="268" text-anchor="middle" font-size="10" font-weight="bold" fill="#F57F17">Multi-Strategy Inference</text>
  <text x="498" y="286" text-anchor="middle" font-size="9" fill="#333">MAP</text>
  <text x="500" y="300" text-anchor="middle" font-size="8" fill="#777">(L-BFGS)</text>
  <text x="610" y="286" text-anchor="middle" font-size="9" fill="#333">HMC</text>
  <text x="610" y="300" text-anchor="middle" font-size="8" fill="#777">(4 chains)</text>
  <text x="720" y="286" text-anchor="middle" font-size="9" fill="#333">Variational</text>
  <text x="720" y="300" text-anchor="middle" font-size="8" fill="#777">(ADVI)</text>

  <!-- Fallback arrows -->
  <line x1="535" y1="290" x2="575" y2="290" stroke="#F57F17" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="645" y1="290" x2="685" y2="290" stroke="#F57F17" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="315" text-anchor="middle" font-size="7.5" fill="#999">fallback</text>
  <text x="665" y="315" text-anchor="middle" font-size="7.5" fill="#999">fallback</text>

  <!-- Arrow from data to model block -->
  <line x1="390" y1="170" x2="427" y2="170" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- POSTERIOR OUTPUTS -->
  <rect x="430" y="360" width="350" height="50" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="605" y="382" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A148C">06: Posterior to JSON</text>
  <text x="605" y="398" text-anchor="middle" font-size="9" fill="#555">MAP + 500 posterior draws per component</text>

  <line x1="605" y1="340" x2="605" y2="357" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OUTPUT FILES -->
  <rect x="320" y="440" width="200" height="55" rx="8" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="420" y="462" text-anchor="middle" font-size="11" font-weight="bold" fill="#004D40">Calibrated JSON</text>
  <text x="420" y="478" text-anchor="middle" font-size="9" fill="#555">config/calibrated/{variant}.json</text>
  <text x="420" y="490" text-anchor="middle" font-size="9" fill="#555">25 variant files</text>

  <rect x="560" y="440" width="200" height="55" rx="8" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="462" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Diagnostics</text>
  <text x="660" y="478" text-anchor="middle" font-size="9" fill="#555">Convergence checks</text>
  <text x="660" y="490" text-anchor="middle" font-size="9" fill="#555">Default vs. calibrated plots</text>

  <line x1="545" y1="410" x2="450" y2="437" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="660" y1="410" x2="660" y2="437" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- FVS MODERN -->
  <rect x="320" y="530" width="200" height="50" rx="8" fill="#E8EAF6" stroke="#283593" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="420" y="552" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A237E">FVS-Modern</text>
  <text x="420" y="568" text-anchor="middle" font-size="9" fill="#555">Modernized Fortran simulator</text>

  <line x1="420" y1="495" x2="420" y2="527" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HPC annotation -->
  <rect x="30" y="350" width="170" height="75" rx="6" fill="#ECEFF1" stroke="#546E7A" stroke-width="1" filter="url(#shadow)"/>
  <text x="115" y="372" text-anchor="middle" font-size="10" font-weight="bold" fill="#37474F">HPC Deployment</text>
  <text x="115" y="388" text-anchor="middle" font-size="8.5" fill="#555">SLURM array job</text>
  <text x="115" y="401" text-anchor="middle" font-size="8.5" fill="#555">25 variants in parallel</text>
  <text x="115" y="414" text-anchor="middle" font-size="8.5" fill="#555">8 cores, 32 GB each</text>

  <line x1="200" y1="387" x2="427" y2="387" stroke="#546E7A" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="30" y="600" width="940" height="60" rx="5" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="0.5"/>
  <text x="50" y="620" font-size="9" font-weight="bold" fill="#333">Legend:</text>
  <rect x="100" y="610" width="14" height="14" rx="2" fill="#E8F0FE" stroke="#4285F4"/>
  <text x="120" y="622" font-size="8.5" fill="#555">Data source</text>
  <rect x="195" y="610" width="14" height="14" rx="2" fill="#FFF3E0" stroke="#FB8C00"/>
  <text x="215" y="622" font-size="8.5" fill="#555">Configuration</text>
  <rect x="305" y="610" width="14" height="14" rx="2" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="325" y="622" font-size="8.5" fill="#555">Model fitting</text>
  <rect x="410" y="610" width="14" height="14" rx="2" fill="#FFF8E1" stroke="#F9A825"/>
  <text x="430" y="622" font-size="8.5" fill="#555">Inference strategy</text>
  <rect x="540" y="610" width="14" height="14" rx="2" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="560" y="622" font-size="8.5" fill="#555">Conversion</text>
  <rect x="630" y="610" width="14" height="14" rx="2" fill="#E0F2F1" stroke="#00695C"/>
  <text x="650" y="622" font-size="8.5" fill="#555">Output</text>
  <rect x="700" y="610" width="14" height="14" rx="2" fill="#E8EAF6" stroke="#283593"/>
  <text x="720" y="622" font-size="8.5" fill="#555">Downstream consumer</text>
  <text x="50" y="648" font-size="8" fill="#999">Arrows indicate data flow. Dashed box encloses the per-variant model fitting stage. Fallback arrows show the multi-strategy inference cascade.</text>
</svg>
