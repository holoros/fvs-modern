<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; }
      .label { font-family: Arial, sans-serif; font-size: 12px; font-weight: 500; text-anchor: middle; }
      .small-label { font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
      .data-box { fill: #C8E6F5; stroke: #0277BD; stroke-width: 2; }
      .process-box { fill: #C8E6C9; stroke: #388E3C; stroke-width: 2; }
      .decision-box { fill: #FFE0B2; stroke: #F57C00; stroke-width: 2; }
      .output-box { fill: #E1BEE7; stroke: #7B1FA2; stroke-width: 2; }
      .arrow { stroke: #424242; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed-arrow { stroke: #757575; stroke-width: 1.5; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead-gray); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#424242" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#757575" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="35" class="title">Figure 3: FVS Bayesian Recalibration Pipeline Architecture</text>

  <!-- Start: FIA Database -->
  <rect x="450" y="70" width="300" height="60" rx="5" class="data-box"/>
  <text x="600" y="105" class="label">FIA Database</text>

  <!-- Arrow down -->
  <path d="M 600 130 L 600 170" class="arrow"/>

  <!-- FIA Data Extraction -->
  <rect x="425" y="170" width="350" height="70" rx="8" class="process-box"/>
  <text x="600" y="195" class="label">FIA Data Extraction</text>
  <text x="600" y="215" class="small-label">Script 01 | rFIA package</text>

  <!-- Arrow down -->
  <path d="M 600 240 L 600 280" class="arrow"/>

  <!-- Variant Loop Start -->
  <rect x="400" y="280" width="400" height="50" rx="5" class="process-box" fill="none" stroke="#388E3C" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="600" y="310" class="label" font-style="italic">Sequential Loop (per Variant)</text>

  <!-- Arrow down -->
  <path d="M 600 330 L 600 370" class="arrow"/>

  <!-- Script 02: Diameter Growth -->
  <rect x="425" y="370" width="350" height="70" rx="8" class="process-box"/>
  <text x="600" y="395" class="label">Diameter Growth Fitting</text>
  <text x="600" y="415" class="small-label">Script 02 | CmdStanR</text>

  <!-- Arrow down -->
  <path d="M 600 440 L 600 480" class="arrow"/>

  <!-- Script 03: Height Diameter -->
  <rect x="425" y="480" width="350" height="70" rx="8" class="process-box"/>
  <text x="600" y="505" class="label">Height Diameter Fitting</text>
  <text x="600" y="525" class="small-label">Script 03 | brms Chapman Richards</text>

  <!-- Arrow down -->
  <path d="M 600 550 L 600 590" class="arrow"/>

  <!-- Script 03b: Height Increment (conditional) -->
  <polygon points="600,590 650,620 600,650 550,620" class="decision-box"/>
  <text x="600" y="620" class="small-label">Height</text>
  <text x="600" y="633" class="small-label">Increment?</text>

  <!-- Yes path to Script 03b -->
  <path d="M 650 620 L 750 620 L 750 550 L 850 550" class="dashed-arrow"/>
  <text x="700" y="615" class="small-label">If variant</text>

  <!-- Script 03b box -->
  <rect x="850" y="510" width="280" height="70" rx="8" class="process-box"/>
  <text x="990" y="535" class="label">Height Increment Fitting</text>
  <text x="990" y="555" class="small-label">Script 03b | CmdStanR</text>

  <!-- Rejoin from 03b -->
  <path d="M 990 580 L 990 650 L 600 650" class="dashed-arrow"/>

  <!-- No path continues down -->
  <path d="M 600 650 L 600 690" class="arrow"/>

  <!-- Script 04: Mortality -->
  <rect x="425" y="690" width="350" height="70" rx="8" class="process-box"/>
  <text x="600" y="715" class="label">Mortality Fitting</text>
  <text x="600" y="735" class="small-label">Script 04 | brms logistic</text>

  <!-- Arrow down -->
  <path d="M 600 760 L 600 800" class="arrow"/>

  <!-- Script 05: Crown Ratio -->
  <rect x="425" y="800" width="350" height="70" rx="8" class="process-box"/>
  <text x="600" y="825" class="label">Crown Ratio Fitting</text>
  <text x="600" y="845" class="small-label">Script 05 | brms linear</text>

  <!-- Arrow down -->
  <path d="M 600 870 L 600 910" class="arrow"/>

  <!-- Multi-Strategy Inference Framework (Decision Tree) -->
  <g id="inference-framework">
    <!-- Main decision: Try MAP first -->
    <rect x="425" y="910" width="350" height="70" rx="8" class="process-box"/>
    <text x="600" y="940" class="label">MAP Estimation (L BFGS)</text>
    <text x="600" y="960" class="small-label">Always succeeds</text>

    <!-- Arrow down to HMC decision -->
    <path d="M 600 980 L 600 1020" class="arrow"/>

    <!-- HMC attempt -->
    <polygon points="600,1020 680,1070 600,1120 520,1070" class="decision-box"/>
    <text x="600" y="1070" class="label" font-size="11">Try HMC</text>
    <text x="600" y="1085" class="small-label">(4 chains)</text>

    <!-- HMC Success path -->
    <path d="M 680 1070 L 850 1070" class="arrow"/>
    <text x="750" y="1060" class="small-label">Converged?</text>

    <!-- HMC Success box -->
    <rect x="850" y="1040" width="280" height="60" rx="5" class="output-box"/>
    <text x="990" y="1070" class="label">Use HMC Posterior</text>

    <!-- HMC Failure path -->
    <path d="M 600 1120 L 600 1160" class="arrow"/>
    <text x="620" y="1145" class="small-label">No</text>

    <!-- ADVI decision -->
    <polygon points="600,1160 680,1210 600,1260 520,1210" class="decision-box"/>
    <text x="600" y="1215" class="label" font-size="11">Try ADVI</text>

    <!-- ADVI Success -->
    <path d="M 680 1210 L 850 1210" class="arrow"/>
    <text x="750" y="1200" class="small-label">Converged?</text>

    <!-- ADVI Success box -->
    <rect x="850" y="1180" width="280" height="60" rx="5" class="output-box"/>
    <text x="990" y="1210" class="label">Use VI Posterior</text>

    <!-- ADVI Failure falls back to MAP -->
    <path d="M 520 1210 L 350 1210 L 350 945 L 425 945" class="dashed-arrow"/>
    <text x="320" y="1080" class="small-label">Fail</text>
  </g>

  <!-- Merge point after inference -->
  <path d="M 600 1260 L 600 1300" class="arrow"/>

  <!-- Script 06: JSON Export -->
  <rect x="425" y="1300" width="350" height="70" rx="8" class="process-box"/>
  <text x="600" y="1325" class="label">Posterior to JSON Conversion</text>
  <text x="600" y="1345" class="small-label">Script 06</text>

  <!-- Arrow down -->
  <path d="M 600 1370 L 600 1410" class="arrow"/>

  <!-- End variant loop -->
  <rect x="400" y="1410" width="400" height="50" rx="5" class="process-box" fill="none" stroke="#388E3C" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="600" y="1440" class="label" font-style="italic">End Variant Loop</text>

  <!-- Arrow down to stand data -->
  <path d="M 600 1460 L 600 1500" class="arrow"/>

  <!-- Stand Data Extraction (parallel section) -->
  <rect x="100" y="280" width="280" height="70" rx="8" class="process-box"/>
  <text x="240" y="305" class="label">Stand Data Extraction</text>
  <text x="240" y="325" class="small-label">Script 08 | rFIA</text>

  <!-- Arrow down from stand data -->
  <path d="M 240 350 L 240 1500 L 400 1500" class="dashed-arrow"/>

  <!-- Script 09: SDI Calibration -->
  <rect x="425" y="1500" width="350" height="70" rx="8" class="process-box"/>
  <text x="600" y="1525" class="label">Stand Density / SDI MAX Calibration</text>
  <text x="600" y="1545" class="small-label">Script 09</text>

  <!-- Arrow to final output -->
  <path d="M 600 1570 L 600 1610" class="arrow"/>

  <!-- Final Output -->
  <rect x="450" y="1610" width="300" height="60" rx="5" class="output-box"/>
  <text x="600" y="1645" class="label">Calibrated FVS</text>

  <!-- Legend -->
  <g id="legend" transform="translate(50, 1480)">
    <text x="0" y="0" class="small-label" font-weight="bold">Legend:</text>
    <rect x="0" y="10" width="20" height="20" class="data-box"/>
    <text x="30" y="25" class="small-label" text-anchor="start">Data I/O</text>

    <rect x="120" y="10" width="20" height="20" class="process-box"/>
    <text x="150" y="25" class="small-label" text-anchor="start">Process</text>

    <rect x="240" y="10" width="20" height="20" class="decision-box"/>
    <text x="270" y="25" class="small-label" text-anchor="start">Decision</text>

    <rect x="360" y="10" width="20" height="20" class="output-box"/>
    <text x="390" y="25" class="small-label" text-anchor="start">Output</text>
  </g>

</svg>